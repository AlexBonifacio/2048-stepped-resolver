name: Build Windows package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build solver with MSVC
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VS_PATH=%%i
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat"
          cl /nologo /EHsc /std:c++17 /O2 /MT /Fe:2048-ranks.exe src\board.cpp src\evaluator.cpp src\main.cpp src\move.cpp src\solver.cpp src\stat.cpp

      - name: Add embedded Python runtime
        shell: pwsh
        run: |
          Invoke-WebRequest "https://www.python.org/ftp/python/3.12.4/python-3.12.4-embed-amd64.zip" -OutFile python-embed.zip
          Expand-Archive python-embed.zip -DestinationPath python

      - name: Add mss for screen capture
        shell: pwsh
        run: python -m pip install mss --target python

      - name: Build package
        shell: pwsh
        run: python tools/package_windows.py --solver-exe 2048-ranks.exe --no-zip

      # Upload the folder, not the zip: GitHub already wraps artifacts in a
      # zip on download, so uploading a zip forced a zip-in-a-zip extraction.
      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: 2048-ranks-windows
          path: dist/2048-ranks-windows
